<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Page Not Found')}"></head>
<body class="sf-body sf-auth-body">

<div class="sf-auth-container">
    <div class="sf-auth-card text-center">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
        </div>
        <h1 class="text-white mb-3">404</h1>
        <h4 class="text-muted mb-3">Page Not Found</h4>
        <p class="text-muted mb-4" th:if="${message}" th:text="${message}">
            The page you're looking for doesn't exist.
        </p>
        <p class="text-muted mb-4" th:if="${message == null}">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a th:href="@{/}" class="btn btn-accent btn-lg">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
