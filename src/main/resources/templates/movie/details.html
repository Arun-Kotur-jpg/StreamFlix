<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${movie.title})}"></head>
<body class="sf-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="sf-main">
    <div class="sf-details-page">
        <!-- Backdrop -->
        <div class="sf-details-backdrop" th:style="'background-image: url(' + ${movie.coverUrl != null ? movie.coverUrl : movie.thumbnailUrl} + ')'"></div>
        <div class="sf-details-overlay"></div>

        <div class="container sf-details-content">
            <div class="row g-4 align-items-start pt-5">
                <!-- Poster -->
                <div class="col-md-4 col-lg-3">
                    <div class="sf-details-poster">
                        <img th:src="${movie.thumbnailUrl}" th:alt="${movie.title}" class="img-fluid rounded-3"
                             onerror="this.src='https://placehold.co/300x450/1a1d29/666?text=No+Image'">
                    </div>
                </div>

                <!-- Info -->
                <div class="col-md-8 col-lg-9">
                    <h1 class="sf-details-title" th:text="${movie.title}">Movie Title</h1>

                    <div class="d-flex flex-wrap gap-3 mb-3">
                        <span class="sf-detail-chip" th:if="${movie.releaseYear}">
                            <i class="bi bi-calendar3"></i> <span th:text="${movie.releaseYear}">2024</span>
                        </span>
                        <span class="sf-detail-chip" th:if="${movie.duration}">
                            <i class="bi bi-clock"></i> <span th:text="${movie.duration}">2h 15m</span>
                        </span>
                        <span class="sf-detail-chip" th:if="${movie.genre}">
                            <i class="bi bi-tag"></i> <span th:text="${movie.genre}">Genre</span>
                        </span>
                        <span class="sf-detail-chip" th:if="${movie.language}">
                            <i class="bi bi-translate"></i> <span th:text="${movie.language}">Language</span>
                        </span>
                        <span class="sf-detail-chip sf-rating-chip" th:if="${movie.rating}">
                            <i class="bi bi-star-fill text-warning"></i> <span th:text="${movie.rating}">8.5</span>/10
                        </span>
                    </div>

                    <p class="sf-details-desc" th:text="${movie.description}">
                        Movie description goes here. This is a detailed description of the movie plot and storyline.
                    </p>

                    <div class="d-flex gap-3 flex-wrap mt-4">
                        <a th:href="@{/movies/watch/{id}(id=${movie.movieId})}" class="btn btn-accent btn-lg px-5">
                            <i class="bi bi-play-fill me-2"></i>Watch Now
                        </a>

                        <!-- Watchlist Button (authenticated users) -->
                        <div sec:authorize="isAuthenticated()">
                            <form th:if="${!inWatchlist}" th:action="@{/watchlist/add/{id}(id=${movie.movieId})}" method="post">
                                <button type="submit" class="btn btn-outline-light btn-lg px-4">
                                    <i class="bi bi-plus-lg me-2"></i>Add to Watchlist
                                </button>
                            </form>
                            <form th:if="${inWatchlist}" th:action="@{/watchlist/remove/{id}(id=${movie.movieId})}" method="post">
                                <button type="submit" class="btn btn-outline-warning btn-lg px-4">
                                    <i class="bi bi-bookmark-check-fill me-2"></i>In Watchlist
                                </button>
                            </form>
                        </div>

                        <!-- Login prompt for non-authenticated -->
                        <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-outline-light btn-lg px-4">
                            <i class="bi bi-person me-2"></i>Login to Save
                        </a>
                    </div>

                    <!-- Flash Messages -->
                    <div class="mt-3">
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${success}">Success</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${info}" class="alert alert-info alert-dismissible fade show" role="alert">
                            <span th:text="${info}">Info</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
