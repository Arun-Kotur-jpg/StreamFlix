<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body class="sf-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="sf-main">
    <div class="container-fluid px-4 pt-5 mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-white"><i class="bi bi-speedometer2 me-2 text-warning"></i>Admin Dashboard</h2>
            <a th:href="@{/admin/movies/add}" class="btn btn-accent">
                <i class="bi bi-plus-lg me-2"></i>Add Movie
            </a>
        </div>

        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}">Success</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3 col-6">
                <div class="sf-admin-stat-card">
                    <div class="sf-admin-stat-icon bg-accent-soft">
                        <i class="bi bi-people-fill text-accent"></i>
                    </div>
                    <div>
                        <h3 class="text-white mb-0" th:text="${totalUsers}">0</h3>
                        <small class="text-muted">Total Users</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sf-admin-stat-card">
                    <div class="sf-admin-stat-icon bg-info-soft">
                        <i class="bi bi-film text-info"></i>
                    </div>
                    <div>
                        <h3 class="text-white mb-0" th:text="${totalMovies}">0</h3>
                        <small class="text-muted">Total Movies</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sf-admin-stat-card">
                    <div class="sf-admin-stat-icon bg-success-soft">
                        <i class="bi bi-collection-play text-success"></i>
                    </div>
                    <div>
                        <h3 class="text-white mb-0" th:text="${totalMovies}">0</h3>
                        <small class="text-muted">Active Streams</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-6">
                <div class="sf-admin-stat-card">
                    <div class="sf-admin-stat-icon bg-warning-soft">
                        <i class="bi bi-graph-up-arrow text-warning"></i>
                    </div>
                    <div>
                        <h3 class="text-white mb-0">Active</h3>
                        <small class="text-muted">System Status</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Movies Table -->
        <div class="sf-admin-table-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="text-white mb-0"><i class="bi bi-film me-2"></i>Movie Management</h5>
                <span class="badge bg-secondary" th:text="${movies.size()} + ' movies'">0 movies</span>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-hover sf-admin-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Poster</th>
                            <th>Title</th>
                            <th>Genre</th>
                            <th>Language</th>
                            <th>Year</th>
                            <th>Rating</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="movie, iterStat : ${movies}">
                            <td th:text="${iterStat.count}">1</td>
                            <td>
                                <img th:src="${movie.thumbnailUrl}" th:alt="${movie.title}"
                                     class="sf-admin-thumbnail"
                                     onerror="this.src='https://placehold.co/40x60/1a1d29/666?text=N/A'">
                            </td>
                            <td>
                                <a th:href="@{/movies/{id}(id=${movie.movieId})}" class="text-accent text-decoration-none"
                                   th:text="${movie.title}">Title</a>
                            </td>
                            <td th:text="${movie.genre}">Genre</td>
                            <td th:text="${movie.language}">Language</td>
                            <td th:text="${movie.releaseYear}">2024</td>
                            <td>
                                <span class="text-warning" th:if="${movie.rating}">
                                    <i class="bi bi-star-fill"></i> <span th:text="${movie.rating}">8.5</span>
                                </span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/admin/movies/edit/{id}(id=${movie.movieId})}"
                                       class="btn btn-sm btn-outline-warning" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/movies/delete/{id}(id=${movie.movieId})}" method="post"
                                          onsubmit="return confirm('Are you sure you want to delete this movie?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Empty State -->
            <div th:if="${movies.isEmpty()}" class="text-center py-4">
                <i class="bi bi-film text-muted display-4"></i>
                <p class="text-muted mt-2">No movies added yet.</p>
                <a th:href="@{/admin/movies/add}" class="btn btn-accent">Add Your First Movie</a>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
