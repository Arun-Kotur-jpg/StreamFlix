<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${isEdit} ? 'Edit Movie' : 'Add Movie')}"></head>
<body class="sf-body">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="sf-main">
    <div class="container pt-5 mt-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="sf-form-card">
                    <h3 class="text-white mb-4">
                        <i class="bi me-2" th:classappend="${isEdit} ? 'bi-pencil-square text-warning' : 'bi-plus-circle text-accent'"></i>
                        <span th:text="${isEdit} ? 'Edit Movie' : 'Add New Movie'">Add Movie</span>
                    </h3>

                    <form th:action="${isEdit} ? @{/admin/movies/edit/{id}(id=${movieDto.movieId})} : @{/admin/movies/add}"
                          method="post" th:object="${movieDto}">

                        <div class="row g-3">
                            <!-- Title -->
                            <div class="col-12">
                                <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                                <input type="text" id="title" th:field="*{title}" class="form-control sf-input"
                                       placeholder="Enter movie title" required>
                                <div th:if="${#fields.hasErrors('title')}" class="text-danger small mt-1"
                                     th:errors="*{title}">Error</div>
                            </div>

                            <!-- Description -->
                            <div class="col-12">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" th:field="*{description}" class="form-control sf-input"
                                          rows="4" placeholder="Enter movie description"></textarea>
                            </div>

                            <!-- Genre & Language -->
                            <div class="col-md-6">
                                <label for="genre" class="form-label">Genre</label>
                                <select id="genre" th:field="*{genre}" class="form-select sf-input">
                                    <option value="">Select Genre</option>
                                    <option value="Action">Action</option>
                                    <option value="Comedy">Comedy</option>
                                    <option value="Drama">Drama</option>
                                    <option value="Horror">Horror</option>
                                    <option value="Romance">Romance</option>
                                    <option value="Sci-Fi">Sci-Fi</option>
                                    <option value="Thriller">Thriller</option>
                                    <option value="Animation">Animation</option>
                                    <option value="Documentary">Documentary</option>
                                    <option value="Fantasy">Fantasy</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="language" class="form-label">Language</label>
                                <select id="language" th:field="*{language}" class="form-select sf-input">
                                    <option value="">Select Language</option>
                                    <option value="English">English</option>
                                    <option value="Hindi">Hindi</option>
                                    <option value="Tamil">Tamil</option>
                                    <option value="Telugu">Telugu</option>
                                    <option value="Malayalam">Malayalam</option>
                                    <option value="Kannada">Kannada</option>
                                    <option value="Korean">Korean</option>
                                    <option value="Japanese">Japanese</option>
                                    <option value="Spanish">Spanish</option>
                                </select>
                            </div>

                            <!-- Release Year & Duration -->
                            <div class="col-md-4">
                                <label for="releaseYear" class="form-label">Release Year</label>
                                <input type="number" id="releaseYear" th:field="*{releaseYear}" class="form-control sf-input"
                                       placeholder="2024" min="1900" max="2030">
                            </div>
                            <div class="col-md-4">
                                <label for="duration" class="form-label">Duration</label>
                                <input type="text" id="duration" th:field="*{duration}" class="form-control sf-input"
                                       placeholder="2h 15m">
                            </div>
                            <div class="col-md-4">
                                <label for="rating" class="form-label">Rating (0-10)</label>
                                <input type="number" id="rating" th:field="*{rating}" class="form-control sf-input"
                                       placeholder="8.5" min="0" max="10" step="0.1">
                            </div>

                            <!-- Thumbnail URL -->
                            <div class="col-12">
                                <label for="thumbnailUrl" class="form-label">Thumbnail URL</label>
                                <input type="url" id="thumbnailUrl" th:field="*{thumbnailUrl}" class="form-control sf-input"
                                       placeholder="e.g. https://example.com/poster.jpg">
                                <small class="text-muted">Paste a direct image URL for the movie poster</small>
                            </div>

                            <!-- Cover URL -->
                            <div class="col-12">
                                <label for="coverUrl" class="form-label">Cover Banner URL</label>
                                <input type="url" id="coverUrl" th:field="*{coverUrl}" class="form-control sf-input"
                                       placeholder="e.g. https://example.com/banner.jpg">
                                <small class="text-muted">Paste a horizontal banner URL (1200x500 recommended)</small>
                            </div>

                            <!-- Video URL -->
                            <div class="col-12">
                                <label for="videoUrl" class="form-label">Video URL</label>
                                <input type="url" id="videoUrl" th:field="*{videoUrl}" class="form-control sf-input"
                                       placeholder="https://example.com/video.mp4">
                                <small class="text-muted">Paste a direct MP4 video URL for streaming</small>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-accent btn-lg px-5">
                                <i class="bi me-2" th:classappend="${isEdit} ? 'bi-check-lg' : 'bi-plus-lg'"></i>
                                <span th:text="${isEdit} ? 'Update Movie' : 'Add Movie'">Save</span>
                            </button>
                            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-lg px-4">
                                <i class="bi bi-x-lg me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
